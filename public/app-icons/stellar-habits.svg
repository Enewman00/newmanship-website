    fill="#F59E0B"/>
  <!-- Small accent stars scattered around -->
  <circle cx="140" cy="140" r="5" fill="#F59E0B" opacity="0.5"/>
  <circle cx="380" cy="120" r="4" fill="#F59E0B" opacity="0.4"/>
  <circle cx="410" cy="330" r="3" fill="#F59E0B" opacity="0.35"/>
  <circle cx="100" cy="340" r="4" fill="#F59E0B" opacity="0.3"/>
  <circle cx="310" cy="430" r="3" fill="#F59E0B" opacity="0.25"/>
  <circle cx="170" cy="420" r="3" fill="#F59E0B" opacity="0.3"/>
</svg>
