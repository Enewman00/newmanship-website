<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: deep night sky -->
  <rect width="512" height="512" rx="112" fill="#050709"/>
  <!-- Ambient glow behind star -->
  <circle cx="256" cy="240" r="150" fill="#F59E0B" opacity="0.07"/>
  <circle cx="256" cy="240" r="100" fill="#F59E0B" opacity="0.06"/>
  <!-- 5-pointed star (outer r=160, inner r=65, center 256,240) -->
