<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: warm cream -->
  <rect width="512" height="512" rx="112" fill="#FBF6EC"/>
  <!-- Soft circle background for checkmark -->
  <circle cx="256" cy="256" r="188" fill="#6366F1" opacity="0.07"/>
  <!-- Checklist lines (unchecked rows) -->
  <line x1="108" y1="180" x2="404" y2="180" stroke="#6366F1" stroke-width="18" stroke-linecap="round" opacity="0.15"/>
  <line x1="108" y1="332" x2="404" y2="332" stroke="#6366F1" stroke-width="18" stroke-linecap="round" opacity="0.15"/>
  <!-- Bold checkmark (the main element) -->
  <polyline
    points="108,256 204,362 404,152"
    fill="none"
    stroke="#6366F1"
    stroke-width="58"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
