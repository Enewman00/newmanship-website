<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: soft eco green -->
  <rect width="512" height="512" rx="112" fill="#F0FDF4"/>
  <!-- Stem -->
  <line x1="256" y1="420" x2="256" y2="230" stroke="#22C55E" stroke-width="26" stroke-linecap="round"/>
  <!-- Left leaf (curves left and up) -->
  <path d="M256,320 Q165,268 148,140 Q236,188 256,320Z" fill="#22C55E"/>
  <!-- Right leaf (curves right and up, slightly darker) -->
  <path d="M256,272 Q347,220 364,92 Q276,140 256,272Z" fill="#16A34A"/>
  <!-- Small ground / root indicator -->
  <line x1="168" y1="420" x2="344" y2="420" stroke="#22C55E" stroke-width="20" stroke-linecap="round" opacity="0.35"/>
  <!-- Tiny alarm bell at top of sprout -->
  <circle cx="256" cy="110" r="36" fill="#22C55E" opacity="0.15" stroke="#22C55E" stroke-width="8"/>
  <path d="M240,110 Q256,90 272,110 L268,126 Q256,132 244,126Z" fill="#22C55E"/>
</svg>
